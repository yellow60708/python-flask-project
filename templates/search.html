<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>顧客查詢系統</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <script>
        async function searchData() {

            let keyword = document.getElementById("searchInput").value;

            let response = await fetch("/search?keyword=" + keyword);
            let html = await response.text();

            document.getElementById("tableArea").innerHTML =
                new DOMParser()
                    .parseFromString(html, "text/html")
                    .getElementById("tableArea")
                    .innerHTML;
        }
    </script>

</head>

<body class="bg-light">

<div class="container py-4">

    <a href="/" class="btn btn-secondary mb-3">回首頁</a>

    <div class="card shadow-sm">
        <div class="card-body">

            <h4 class="mb-3 text-center">顧客查詢</h4>

            <!-- 搜尋 -->
            <div class="input-group mb-3">
                <input type="text"
                       id="searchInput"
                       class="form-control"
                       placeholder="輸入 09 開始搜尋"
                       onkeyup="searchData()"
                       autocomplete="off">
            </div>

            <!-- 表格區塊 -->
            <div id="tableArea">

                <div class="table-responsive">

                    <table class="table table-hover text-center align-middle">

                        <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>姓名</th>
                            <th>電話</th>
                            <th>欠款</th>
                            <th>狀態</th>
                            <th>黑名單</th>
                        </tr>
                        </thead>

                        <tbody>

                        {% for user in users %}

                            <tr {% if user[8] == 1 %} style="background:#ffe6e6;" {% endif %}>

                                <td>{{ user[0] }}</td>
                                <td>{{ user[1] }}</td>
                                <td>{{ user[2] }}</td>

                                <td>
                                    {% if user[7] > 0 %}
                                        <span class="text-danger fw-bold">
                                            {{ user[7] }}
                                        </span>
                                    {% else %}
                                        <span class="text-success fw-bold">
                                            已付清
                                        </span>
                                    {% endif %}
                                </td>

                                <td>
                                    {% if user[9] == 'done' %}
                                        <span class="badge bg-success">已取</span>
                                    {% else %}
                                        <span class="badge bg-warning">未取</span>
                                    {% endif %}
                                </td>

                                <td>
                                    {% if user[8] == 1 %}
                                        <span class="badge bg-danger">黑名單</span>
                                    {% else %}
                                        <span class="badge bg-success">正常</span>
                                    {% endif %}
                                </td>

                            </tr>

                        {% endfor %}

                        </tbody>

                    </table>

                </div>

            </div>

        </div>
    </div>

</div>

</body>
</html>
